name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trigger Render deploy (Backend)
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

      - name: Wait for deploy to finish
        run: |
          sleep 60

      - name: Wait for backend to be healthy
        run: |
          for i in {1..10}; do
            curl -f https://usuarios-eventos-app.onrender.com/ && exit 0
            sleep 5
          done
          exit 1