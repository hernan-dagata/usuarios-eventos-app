<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Gestion de usuarios App</title>
        <link rel="stylesheet" href="css/styles.css">
    </head>
    <body>
        <header>
            <h1>Users Events App</h1>
            <p>Frontend conectado con nuestra API</p>
        </header>
        <main>
            <section>
                <h2>Crear usuario</h2>
                <form id="user-form">
                    <input
                        type="text"
                        id="name"
                        placeholder="Nombre"
                        required>
                    <input
                        type="email"
                        id="email"
                        placeholder="Email"
                        required>
                    <button type="submit">
                        Crear
                    </button>
                </form>
            </section>

            <section>
                <h2>Buscar usuarios</h2>
                <input 
                    type="text" 
                    id="search-input" 
                    placeholder="Buscar por nombre o email..."
                >
            </section>
            <section>
                <h2>Usuarios registrados</h2>
                <div id="users-container">
                    <!-- Usuarios aparecerán aquí -->
                </div>
            </section>
        </main>

        <script src="js/app.js"></script>
    </body>
</html>
